name: Deploy to Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create .env file on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            mkdir -p /var/www/gameplaza
            cat > /var/www/gameplaza/.env << 'EOF'
            NODE_ENV=production
            PORT=3000
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
            SUPABASE_PROJECT_ID=${{ secrets.SUPABASE_PROJECT_ID }}
            DIGISELLER_SELLER_ID=${{ secrets.DIGISELLER_SELLER_ID }}
            DIGISELLER_API_KEY=${{ secrets.DIGISELLER_API_KEY }}
            LOVABLE_API_KEY=${{ secrets.LOVABLE_API_KEY }}
            VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
            VITE_SUPABASE_PROJECT_ID=${{ secrets.SUPABASE_PROJECT_ID }}
            EOF

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            REPO_URL="https://github.com/sawin0901-ctrl/digi-bazaar.git"
            APP_DIR="/var/www/gameplaza"

            # Clone if repo doesn't exist yet
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "==> Cloning repository..."
              mkdir -p "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            echo "==> Pulling latest code..."
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

            echo "==> Installing dependencies..."
            bun install --frozen-lockfile

            echo "==> Building..."
            bun run build

            echo "==> Restarting PM2..."
            if pm2 list | grep -q gameplaza; then
              pm2 reload gameplaza --update-env
            else
              pm2 start dist/server/index.mjs --name gameplaza --env-file .env -i 2
              pm2 save
            fi

            echo "==> Deployment complete!"
